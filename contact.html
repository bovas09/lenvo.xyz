<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Padippura</title>
<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:auto;
    padding:40px;
    background:#f7f7f7;
}
.container{
    background:white;
    padding:30px;
    border-radius:10px;
}
input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
}
button{
    background:#0b5ed7;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<h1>Contact Us</h1>

<p>You can contact Padippura using the information below.</p>

<p>Email: <strong>your@email.com</strong></p>

<p>Or send us a message:</p>

<form>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea rows="6" placeholder="Your Message"></textarea>
<button type="submit">Send</button>
</form>

</div>

</body>
</html>
